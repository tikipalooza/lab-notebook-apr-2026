<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Contact and Payment Info</h1>

      <form>
        <label for="name">Name:</label><br />
        <input type="text" name="name" id="name" /><br /><br />

        <label for="address">Address:</label><br />
        <input type="text" name="address" id="address" />
        <br /><br />

        <label for="city">City:</label><br />
        <input type="text" name="city" id="city" />
        <br /><br />

        <label for="zipcode">Zip Code:</label><br />
        <input type="text" name="zip" id="zipcode" />
        <br /><br />

        <fieldset>
          <legend>Credit Card Type:</legend>

          <input type="radio" name="card" value="visa" id="visa" />
          <label for="visa">Visa</label><br />

          <input type="radio" name="card" value="mastercard" id="mastercard" />
          <label for="mastercard">MasterCard</label><br />

          <input type="radio" name="card" value="amex" id="amex" />
          <label for="amex">American Express</label><br />
        </fieldset>

        <br />

        <label for="cc_number">Credit Card Number:</label><br />
        <input type="text" name="cc_number" id="cc_number" /><br /><br />

        <label for="cvc">CVC:</label><br />
        <input type="text" name="cvc" id="cvc" /><br /><br />

        <input type="button" value="Submit" />
        <br />
      </form>
    </main>
  </body>
</html>
